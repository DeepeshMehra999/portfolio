<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project View — Deepesh Mehra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#0d0d0d}
::-webkit-scrollbar-thumb{background:#ff5500;border-radius:2px}
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;--card:#161616;
  --border:rgba(255,255,255,0.08);--bdo:rgba(255,85,0,0.4);
  --orange:#ff5500;--white:#f0f0f0;--muted:#888;--dim:#444;
  --font:'Epilogue',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--white);font-family:var(--font);overflow-x:hidden}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .5s,visibility .5s}
#loader.hide{opacity:0;visibility:hidden}
.loader-ring{width:48px;height:48px;border:1px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .9s linear infinite}
.loader-txt{font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);animation:blink 1.2s ease infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

/* DOCK */
.dock{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:6px;background:rgba(20,20,20,.9);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:50px;padding:9px 16px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.dbtn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;color:var(--muted);font-size:14px;text-decoration:none;position:relative}
.dbtn:hover,.dbtn.act{background:var(--orange);border-color:var(--orange);color:#fff;transform:translateY(-4px)}
.dtip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:4px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--white);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s}
.dbtn:hover .dtip{opacity:1}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:99;display:flex;align-items:center;justify-content:space-between;padding:22px 48px;background:rgba(13,13,13,0);transition:background .4s,border-color .4s,padding .3s;border-bottom:1px solid transparent}
.nav.stuck{background:rgba(13,13,13,.95);backdrop-filter:blur(16px);border-bottom-color:var(--border);padding:14px 48px}
.nav-logo{font-size:18px;font-weight:800;color:var(--white);text-decoration:none}
.nav-logo span{color:var(--orange)}
.nav-back{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;font-family:var(--mono);transition:color .2s}
.nav-back:hover{color:var(--orange)}
.nav-back svg{transition:transform .2s}
.nav-back:hover svg{transform:translateX(-3px)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 48px 72px;position:relative;overflow:hidden}
.hbg{position:absolute;inset:0;z-index:0}
.hbg img{width:100%;height:100%;object-fit:cover;opacity:.12;filter:grayscale(55%);transform:scale(1.08)}
.hbg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,13,13,.2) 0%,rgba(13,13,13,.5) 50%,#0d0d0d 100%)}
.hgrid{position:absolute;inset:0;z-index:1;background-image:linear-gradient(rgba(255,85,0,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,85,0,.025) 1px,transparent 1px);background-size:60px 60px}
.hcontent{position:relative;z-index:2;max-width:860px}
.hbc{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:22px}
.hbc span{color:var(--orange)}
.htags{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.htag{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:2px;border:1px solid}
.htag-c{color:var(--orange);border-color:var(--bdo);background:rgba(255,85,0,.08)}
.htag-r{color:var(--muted);border-color:var(--border);background:rgba(255,255,255,.03)}
.htitle{font-size:clamp(50px,9vw,115px);font-weight:900;line-height:.91;letter-spacing:-2px;text-transform:uppercase;margin-bottom:22px;color:var(--white)}
.htitle .o{color:var(--orange)}
.hdesc{font-size:15px;line-height:1.8;color:var(--muted);max-width:520px;margin-bottom:38px;font-weight:300}
.hbtns{display:flex;gap:12px;flex-wrap:wrap}
.hnum{position:absolute;right:48px;top:50%;transform:translateY(-50%);font-size:clamp(160px,22vw,320px);font-weight:900;color:rgba(255,85,0,.035);line-height:1;user-select:none;z-index:1;letter-spacing:-6px}

/* BTNS */
.btn{display:inline-flex;align-items:center;gap:9px;padding:12px 28px;font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;border-radius:3px;transition:all .28s;cursor:pointer;border:1px solid transparent}
.btn-fill{background:var(--orange);color:#000;border-color:var(--orange)}
.btn-fill:hover{background:transparent;color:var(--orange);transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,85,0,.3)}
.btn-ghost{background:transparent;color:var(--white);border-color:var(--border)}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange);transform:translateY(-2px)}

/* SECTIONS */
.sec{padding:88px 48px}
.slbl{font-family:var(--mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.slbl::before{content:'';width:24px;height:1px;background:var(--orange)}
.sh{font-size:clamp(36px,5vw,58px);font-weight:900;line-height:1;text-transform:uppercase;letter-spacing:-1px;margin-bottom:52px}
.sh .o{color:var(--orange)}
.divider{height:1px;background:var(--border);margin:0 48px}

/* INFO STRIP */
.istrip{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:0 48px}
.irow{display:grid;grid-template-columns:repeat(5,1fr);border-left:1px solid var(--border)}
.icell{padding:30px 22px;border-right:1px solid var(--border);position:relative;overflow:hidden;transition:background .3s}
.icell::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--orange);transition:width .35s}
.icell:hover::after{width:100%}
.icell:hover{background:var(--bg3)}
.icl{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.icv{font-size:14px;font-weight:700;color:var(--white);text-transform:capitalize;line-height:1.3}

/* ABOUT */
.ag{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start}
.abody{font-size:15px;line-height:1.85;color:var(--muted);font-weight:300;margin-bottom:32px}
.imgf{position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--border);aspect-ratio:4/3;background:var(--bg2)}
.imgf img{width:100%;height:100%;object-fit:cover;filter:grayscale(30%) brightness(.85);transition:all .6s}
.imgf:hover img{filter:grayscale(0%) brightness(1);transform:scale(1.04)}
.imgf-badge{position:absolute;top:14px;left:14px;background:rgba(13,13,13,.82);backdrop-filter:blur(10px);border:1px solid var(--bdo);border-radius:3px;padding:6px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--orange)}
.aiwrap{position:sticky;top:100px}

/* GALLERY */
.glayout{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;height:500px}
.gi{position:relative;overflow:hidden;border-radius:6px;border:1px solid var(--border);background:var(--bg2);cursor:zoom-in;transition:border-color .3s}
.gi:hover{border-color:var(--bdo)}
.gi img{width:100%;height:100%;object-fit:cover;filter:grayscale(20%) brightness(.8);transition:all .6s cubic-bezier(.25,.46,.45,.94)}
.gi:hover img{filter:grayscale(0%) brightness(1);transform:scale(1.06)}
.gi.main{grid-row:1/3}
.giov{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,13,.7) 0%,transparent 50%);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;padding:16px}
.gi:hover .giov{opacity:1}
.gizoom{width:36px;height:36px;border:1px solid rgba(255,255,255,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;transition:all .2s}
.gi:hover .gizoom{border-color:var(--orange);color:var(--orange)}
.gextra{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
.gextra .gi{height:170px}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal.open{opacity:1;pointer-events:all}
.modal img{max-width:88vw;max-height:86vh;object-fit:contain;border-radius:4px}
.mx{position:absolute;top:24px;right:28px;width:44px;height:44px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--white);font-size:18px;cursor:pointer;transition:all .2s;background:rgba(20,20,20,.7)}
.mx:hover{border-color:var(--orange);color:var(--orange)}

/* TECH */
.twrap{display:flex;flex-wrap:wrap;gap:10px;margin-top:44px}
.tpill{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:3px;border:1px solid var(--border);background:var(--card);font-family:var(--mono);font-size:12px;font-weight:500;color:var(--white);transition:all .3s;cursor:default;position:relative;overflow:hidden}
.tpill::before{content:'';position:absolute;inset:0;background:rgba(255,85,0,.08);transform:translateX(-101%);transition:transform .35s}
.tpill:hover::before{transform:translateX(0)}
.tpill:hover{border-color:var(--bdo);color:var(--orange);transform:translateY(-3px)}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--orange);flex-shrink:0;position:relative;z-index:1}
.tpill span{position:relative;z-index:1}

/* CS CARDS — Work Experience style */
.csg{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:44px}
.csc{padding:30px 26px;background:var(--card);border:1px solid var(--border);border-radius:6px;position:relative;overflow:hidden;transition:all .35s}
.csc::before{content:'';position:absolute;left:0;top:0;width:2px;height:0;background:var(--orange);transition:height .4s}
.csc:hover::before{height:100%}
.csc:hover{background:var(--bg3);border-color:rgba(255,85,0,.2);transform:translateX(4px)}
.csn{font-size:42px;font-weight:900;color:rgba(255,85,0,.08);position:absolute;top:10px;right:18px;line-height:1}
.csi{font-size:20px;margin-bottom:12px}
.cst{font-size:14px;line-height:1.7;color:var(--muted);font-weight:300}

/* TIMELINE */
.tl{margin-top:52px;position:relative;padding-left:60px}
.tltrack{position:absolute;left:20px;top:0;bottom:0;width:1px;background:var(--border)}
.tli{margin-bottom:40px;position:relative;opacity:0;transform:translateX(-18px);transition:all .5s ease}
.tli.vis{opacity:1;transform:none}
.tldot{position:absolute;left:-47px;top:4px;width:40px;height:40px;border-radius:50%;border:1px solid var(--bdo);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;color:var(--orange);transition:all .3s}
.tli:hover .tldot{background:var(--orange);color:#000;box-shadow:0 0 20px rgba(255,85,0,.35)}
.tlph{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--orange);margin-bottom:5px}
.tltl{font-size:18px;font-weight:800;color:var(--white);margin-bottom:8px}
.tldc{font-size:13px;line-height:1.75;color:var(--muted);font-weight:300}

/* RESULTS */
.rsec{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.rgrid{display:grid;grid-template-columns:repeat(4,1fr);border-left:1px solid var(--border);margin-top:52px}
.rcard{border-right:1px solid var(--border);padding:40px 28px;text-align:center;transition:background .3s;position:relative;overflow:hidden}
.rcard:hover{background:var(--bg3)}
.rcard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--orange);transform:scaleX(0);transition:transform .4s;transform-origin:left}
.rcard:hover::after{transform:scaleX(1)}
.rnum{font-size:64px;font-weight:900;color:var(--orange);line-height:1;display:block;margin-bottom:4px}
.rsuf{font-size:36px;font-weight:900;color:var(--orange)}
.rlbl{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:8px}

/* PREV/NEXT */
.pns{padding:0 48px 88px}
.pnlbl{font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:18px;text-align:center}
.png{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.pnc{display:flex;align-items:center;gap:20px;padding:26px 28px;background:var(--card);border:1px solid var(--border);border-radius:6px;text-decoration:none;transition:all .35s;position:relative;overflow:hidden}
.pnc::before{content:'';position:absolute;inset:0;background:rgba(255,85,0,.04);opacity:0;transition:opacity .3s}
.pnc:hover::before{opacity:1}
.pnc:hover{border-color:var(--bdo);transform:translateY(-3px)}
.pnc.nx{flex-direction:row-reverse;text-align:right}
.pnth{width:64px;height:52px;flex-shrink:0;border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.pnth img{width:100%;height:100%;object-fit:cover;filter:grayscale(50%);transition:filter .3s}
.pnc:hover .pnth img{filter:grayscale(0%)}
.pndir{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.pnc.nx .pndir{justify-content:flex-end}
.pnnm{font-size:15px;font-weight:800;color:var(--white);transition:color .2s}
.pnc:hover .pnnm{color:var(--orange)}
.pnem{background:var(--card);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;min-height:104px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}

/* CTA */
.cta{padding:100px 48px;text-align:center;position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(255,85,0,.07) 0%,transparent 70%);pointer-events:none}
.ctag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);margin-bottom:18px}
.cth{font-size:clamp(44px,7vw,86px);font-weight:900;text-transform:uppercase;line-height:.92;letter-spacing:-1px;margin-bottom:26px}
.cth span{color:var(--orange)}
.ctsub{font-size:15px;color:var(--muted);margin-bottom:42px;font-weight:300}
.footer{border-top:1px solid var(--border);padding:22px 48px;display:flex;justify-content:space-between;align-items:center}
.fcopy{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:1px}
.ftop{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.ftop:hover{color:var(--orange)}

/* NF */
.nf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px}
.nfn{font-size:180px;font-weight:900;color:rgba(255,85,0,.07);line-height:1}
.nft{font-size:40px;font-weight:900;text-transform:uppercase;margin-bottom:14px}
.nfd{font-size:14px;color:var(--muted);margin-bottom:36px}

/* SCROLL REVEAL */
.sr{opacity:0;transform:translateY(26px);transition:opacity .65s ease,transform .65s ease}
.sr.sl{transform:translateX(-26px)}
.sr.sr2{transform:translateX(26px)}
.sr.in{opacity:1;transform:none}

/* RESPONSIVE */
@media(max-width:1024px){
  .nav,.sec,.istrip,.pns,.cta,.footer{padding-left:28px;padding-right:28px}
  .hero{padding:0 28px 60px}
  .ag{grid-template-columns:1fr;gap:44px}
  .aiwrap{position:relative;top:auto}
  .irow{grid-template-columns:repeat(3,1fr)}
  .rgrid{grid-template-columns:repeat(2,1fr)}
  .csg{grid-template-columns:1fr}
  .divider{margin:0 28px}
}
@media(max-width:768px){
  .nav,.sec,.istrip,.pns,.cta,.footer{padding-left:16px;padding-right:16px}
  .hero{padding:0 16px 52px}
  .hnum{display:none}
  .glayout{grid-template-columns:1fr;height:auto}
  .gi.main{grid-row:auto;height:220px}
  .gi{height:160px}
  .gextra{grid-template-columns:1fr 1fr}
  .irow{grid-template-columns:repeat(2,1fr)}
  .rgrid{grid-template-columns:repeat(2,1fr)}
  .png{grid-template-columns:1fr}
  .hbtns{flex-direction:column}
  .btn{width:100%;justify-content:center}
  .divider{margin:0 16px}
  .tl{padding-left:50px}
  .tldot{left:-41px;width:36px;height:36px}
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-txt">Loading Project</div>
</div>

<div class="dock">
  <a href="index.html" class="dbtn"><span class="dtip">Home</span><svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M3 12L12 4l9 8M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg></a>
  <a href="#" class="dbtn act"><span class="dtip">Project</span><svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M8 6L3 12l5 6M16 6l5 6-5 6M14 4l-4 16"/></svg></a>
  <a href="index.html#about" class="dbtn"><span class="dtip">About</span><svg width="14" height="14" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.6"/><path stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></a>
  <a href="index.html#projects" class="dbtn"><span class="dtip">Projects</span><svg width="14" height="14" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/></svg></a>
  <a href="index.html#experience" class="dbtn"><span class="dtip">Experience</span><svg width="14" height="14" fill="none" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><path stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg></a>
  <a href="index.html#contact" class="dbtn"><span class="dtip">Contact</span><svg width="14" height="14" fill="none" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/><path stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M2 8l10 6 10-6"/></svg></a>
</div>

<nav class="nav" id="nav">
  <a href="index.html" class="nav-logo">Deepesh<span>.</span></a>
  <a href="index.html#projects" class="nav-back">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M15 19l-7-7 7-7"/></svg>
    Back
  </a>
</nav>

<main id="main"></main>

<div class="modal" id="modal">
  <img src="" alt="" id="mimg">
  <div class="mx" id="mx">✕</div>
</div>

<script>
const projectsData = [
  {
    id:1,title:"Krishi Gifts & Chocolates",category:"web",

function initReveal(){
  const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.1});
  document.querySelectorAll('.sr').forEach(el=>io.observe(el));
  const tlio=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')})},{threshold:.15});
  document.querySelectorAll('.tli').forEach(el=>tlio.observe(el));
}

function initCounters(){
  const io=new IntersectionObserver(es=>{
    es.forEach(e=>{
      if(!e.isIntersecting)return;
      const el=e.target,to=parseInt(el.dataset.to);
      if(isNaN(to))return;
      let cur=0;const inc=to/(1600/16);
      const t=setInterval(()=>{cur=Math.min(cur+inc,to);el.textContent=Math.round(cur);if(cur>=to)clearInterval(t)},16);
      io.unobserve(el);
    });
  },{threshold:.5});
  document.querySelectorAll('.rnum[data-to]').forEach(el=>io.observe(el));
}

function initGallery(){
  const modal=document.getElementById('modal'),mimg=document.getElementById('mimg');
  document.querySelectorAll('.gi').forEach(g=>{
    g.addEventListener('click',()=>{mimg.src=g.dataset.src||g.querySelector('img').src;modal.classList.add('open')});
  });
  document.getElementById('mx').onclick=()=>modal.classList.remove('open');
  modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open')});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')modal.classList.remove('open')});
}

function initParallax(){
  const h=document.getElementById('hbgi');if(!h)return;
  window.addEventListener('scroll',()=>{h.style.transform=`scale(1.08) translateY(${scrollY*.08}px)`},{passive:true});
}
